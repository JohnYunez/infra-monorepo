name: Semantic Release

on: 
  push:
    branches: [main, trunk]
    paths:
      - 'modules/**'
      - '!modules/**/example/**'
      - '!modules/**/examples/**'

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE_SHA" ]; then
              BEFORE_SHA=$(git rev-parse "${{ github.sha }}~1" 2>/dev/null || echo "")
            fi
            echo "base=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute changed module folders
        id: set-matrix
        run: |
          BASE_SHA='${{ steps.base.outputs.base }}'
          HEAD_SHA='${{ github.sha }}'
          echo "Base: $BASE_SHA Head: $HEAD_SHA"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          TARGETS=($(find modules -type f -name "*.tf" | grep -v "/examples" | sed 's|/[^/]*\.tf||' | sort -u))
          declare -a CHANGED_MODULES=()
          for t in "${TARGETS[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^$t/"; then
              CHANGED_MODULES+=("$t")
            fi
          done
          if [ ${#CHANGED_MODULES[@]} -eq 0 ]; then
            echo "No target modules changed."
            MATRIX='[]'
          else
            # Build JSON array
            MATRIX=$(printf '%s\n' "${CHANGED_MODULES[@]}" | jq -R -s -c 'split("\n")[:-1]')
          fi
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix: $MATRIX"

  release:
    name: Semantic Release
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/trunk') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        folder: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - name: Generate token
        id: generate_token
        uses: tibdex/github-app-token@32691ba7c9e7063bd457bd8f2a5703138591fa58 #v1.9.0
        with:
          app_id: ${{ secrets.APP_ID_TOOLKIT_INNERSOURCE }}
          private_key: ${{ secrets.APP_PRIVATEKEY_TOOLKIT_INNERSOURCE }}
      
      - name: Set token for GitHub CLI
        run: echo "GITHUB_TOKEN=${{ steps.generate_token.outputs.token }}" >> $GITHUB_ENV
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'trunk'
          fetch-depth: 0
          token: ${{ env.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set MODULE_NAME
        id: set-module-name
        run: |
          MODULE_NAME="${{ matrix.folder }}"
          MODULE_NAME="${MODULE_NAME#modules/}"
          MODULE_NAME="${MODULE_NAME//\//_}"
          echo "MODULE_NAME=$MODULE_NAME" >> $GITHUB_OUTPUT

      - name: Semantic Release ${{ matrix.folder }}
        id: semantic
        working-directory: ${{ matrix.folder }}
        env:
          GIT_AUTHOR_NAME: "semantic-release-bot"
          GIT_AUTHOR_EMAIL: "semantic-release-bot@bancolombia.com.co"
          GIT_COMMITTER_NAME: "semantic-release-bot"
          GIT_COMMITTER_EMAIL: "semantic-release-bot@bancolombia.com.co"
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          MODULE_NAME: ${{ steps.set-module-name.outputs.MODULE_NAME }}
        run: npm run semantic-release -e semantic-release-monorepo
